name: Build Telegram Android

on:
  workflow_dispatch: # Allows you to trigger the build manually
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

jobs:
  build:
    runs-on: ubuntu-latest
    
    # Telegram's native C++ compilation is resource-intensive; allocating extra memory prevents out-of-memory crashes
    env:
      GRADLE_OPTS: "-Dorg.gradle.jvmargs=-Xmx6g -Dorg.gradle.daemon=false"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1
          submodules: recursive # Telegram relies on several submodules

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'zulu'
          cache: 'gradle'

      - name: Setup Android NDK
        uses: nttld/setup-ndk@v1
        with:
          # Telegram explicitly requires NDK 21.4.7075529 (r21e)
          ndk-version: r21e 

      - name: Make gradlew executable
        run: chmod +x gradlew

      - name: Build Telegram APK
        # Telegram has multiple build flavors. 'assembleAfatStandalone' builds the direct-download version.
        # The repository includes a dummy release.keystore, allowing the release build to succeed out of the box.
        run: ./gradlew :TMessagesProj_AppStandalone:assembleAfatStandalone

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Telegram-Standalone-APK
          path: '**/build/outputs/apk/**/*.apk'
          retention-days: 7
