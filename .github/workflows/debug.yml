name: Build Telegram Android (Optimized)

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    env:
      GRADLE_OPTS: "-Dorg.gradle.jvmargs=-Xmx6g -Dorg.gradle.daemon=false"

    steps:
      # 📦 1. 拉代码
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1
          submodules: recursive

      # ☕ 2. JDK + Gradle cache
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'zulu'
          cache: 'gradle'

      # 📱 3. Android SDK + NDK
      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Setup Android NDK
        uses: nttld/setup-ndk@v1
        with:
          ndk-version: r21e

      # 🧠 4. 缓存 NDK / CMake（避免重复下载 + 加速配置）
      - name: Cache Android SDK / NDK
        uses: actions/cache@v4
        with:
          path: |
            ~/Android/Sdk/ndk
            ~/Android/Sdk/cmake
          key: android-sdk-${{ runner.os }}

      # ⚙️ 5. 核心：缓存 native 构建（增量关键）
      - name: Cache C++ build (.cxx)
        uses: actions/cache@v4
        with:
          path: |
            **/.cxx
          key: cxx-${{ runner.os }}-${{ hashFiles('**/CMakeLists.txt', '**/*.cpp', '**/*.c', '**/*.h', '**/*.hpp', '**/*.S') }}
          restore-keys: |
            cxx-${{ runner.os }}-

      # ⚡ 6. 可选：缓存 build（进一步加速）
      - name: Cache build outputs
        uses: actions/cache@v4
        with:
          path: |
            **/build
          key: build-${{ runner.os }}-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            build-${{ runner.os }}-

      # 🔧 7. Gradle 权限
      - name: Make gradlew executable
        run: chmod +x gradlew

      # 🚀 8. 构建
      - name: Build Telegram APK
        run: ./gradlew :TMessagesProj_AppStandalone:assembleAfatStandalone --stacktrace

      # 📦 9. 上传 APK
      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Telegram-Standalone-APK
          path: '**/build/outputs/apk/**/*.apk'
          retention-days: 7
